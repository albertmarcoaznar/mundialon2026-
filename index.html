<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MundialON 2026</title>
  <meta name="description" content="Resultados y pronósticos MundialON 2026">
  <link rel="icon" href="favicon.ico">

  <!-- Estilos base responsivos y accesibles -->
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --muted:#9aa4b2;
      --accent:#ffcc00;
      --text:#e6eef6;
      --gap:12px;
      font-size:16px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background:linear-gradient(180deg,var(--bg),#071022);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.4;
      padding:16px;
      box-sizing:border-box;
    }

    /* Layout principal */
    .container{
      max-width:1100px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:var(--gap);
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .brand img{width:40px;height:40px;border-radius:6px;object-fit:cover}
    .brand h1{font-size:1.1rem;margin:0}

    /* Tarjetas y lista de partidos */
    .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.12));
      border-radius:10px;
      padding:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.03);
    }
    .match{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 0;
      border-bottom:1px dashed rgba(255,255,255,0.03);
    }
    .match:last-child{border-bottom:0}
    .team{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .flag{
      width:28px;height:20px;border-radius:3px;object-fit:cover;
      flex:0 0 28px;
    }
    .team-name{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:0.95rem;
    }
    .score{
      font-weight:700;
      font-size:1rem;
      min-width:56px;
      text-align:center;
    }
    .meta{
      color:var(--muted);
      font-size:0.85rem;
    }

    /* Responsive */
    @media (max-width:800px){
      .cards{grid-template-columns:1fr}
      header{flex-direction:column;align-items:flex-start;gap:8px}
      .score{min-width:48px;font-size:0.95rem}
      body{padding:12px}
    }

    /* Accesibilidad: foco visible */
    a,button,input{outline-color:var(--accent)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div class="brand" aria-hidden="false">
        <img src="logo.png" alt="MundialON logo" onerror="this.style.display='none'">
        <h1>MundialON 2026</h1>
      </div>
      <nav aria-label="Navegación principal">
        <button id="btn-refresh" aria-label="Actualizar partidos">🔄 Actualizar</button>
      </nav>
    </header>

    <main>
      <!-- Mensajes de estado para lectores de pantalla -->
      <div id="live-status" aria-live="polite" class="sr-only">Cargando...</div>

      <!-- Contenedor donde tu código original probablemente inyecta la lista de partidos -->
      <section id="matches-section" class="cards" aria-label="Partidos">
        <!-- Ejemplo de tarjeta de partido (tu JS debe rellenar estos elementos o usar IDs similares) -->
        <article class="card" id="card-example" aria-hidden="true" style="display:none">
          <div class="match">
            <div class="team">
              <img class="flag" src="flags/mex.png" alt="Bandera local">
              <div class="team-name">Equipo Local</div>
            </div>
            <div class="score" aria-live="polite">- – -</div>
            <div class="team" style="justify-content:flex-end">
              <div class="team-name">Equipo Visitante</div>
              <img class="flag" src="flags/arg.png" alt="Bandera visitante">
            </div>
          </div>
          <div class="meta">Fecha · Grupo</div>
        </article>
      </section>
    </main>

    <footer style="color:var(--muted);font-size:0.9rem">
      © 2026 MundialON — Interfaz optimizada para móvil
    </footer>
  </div>

  <!-- Parche JS: validaciones y envoltorios seguros -->
  <script>
    (function(){
      'use strict';

      // Función segura para parsear puntuaciones evitando NaN
      function safeParseScore(v){
        if (v === null || v === undefined) return null;
        if (typeof v === 'number') return Number.isFinite(v) ? v : null;
        if (typeof v === 'string'){
          const trimmed = v.trim();
          if (trimmed === '') return null;
          const n = Number(trimmed);
          return Number.isFinite(n) ? n : null;
        }
        return null;
      }

      // Formateador seguro para mostrar en UI
      function formatScoreForUI(v){
        return v === null ? '-' : String(v);
      }

      // Exponer utilidades globales sin sobrescribir si ya existen
      if (!window.MundialONUtils) {
        window.MundialONUtils = {
          safeParseScore,
          formatScoreForUI
        };
      }

      // Wrapper para renderizar un partido sin romper la lógica existente.
      // Si tu código ya tiene renderMatch, lo envolvemos para añadir validaciones.
      function wrapRenderMatch(){
        const original = window.renderMatch;
        window.renderMatch = function(matchData, container){
          try {
            // Normalizar estructura mínima esperada
            const m = matchData || {};
            // Intentar usar campos comunes; si no existen, no fallar
            const homeRaw = m.resultado_local ?? m.homeScore ?? m.localScore ?? m.home ?? null;
            const awayRaw = m.resultado_visitante ?? m.awayScore ?? m.visitanteScore ?? m.away ?? null;

            const home = safeParseScore(homeRaw);
            const away = safeParseScore(awayRaw);

            // Si el original existe, llamarlo con datos normalizados añadidos
            if (typeof original === 'function') {
              // Añadimos un campo seguro 'safeResult' para que el render original pueda usarlo
              m.safeResult = { home, away };
              return original.call(this, m, container);
            }

            // Si no hay función original, hacemos un render básico no intrusivo
            const parent = container || document.getElementById('matches-section');
            if (!parent) return;

            const article = document.createElement('article');
            article.className = 'card';
            article.innerHTML = `
              <div class="match">
                <div class="team">
                  <img class="flag" src="${m.flag_local || 'flags/placeholder.png'}" alt="${m.local || 'Local'}">
                  <div class="team-name">${m.local || 'Local'}</div>
                </div>
                <div class="score" aria-live="polite">${formatScoreForUI(home)} – ${formatScoreForUI(away)}</div>
                <div class="team" style="justify-content:flex-end">
                  <div class="team-name">${m.visitante || 'Visitante'}</div>
                  <img class="flag" src="${m.flag_visitante || 'flags/placeholder.png'}" alt="${m.visitante || 'Visitante'}">
                </div>
              </div>
              <div class="meta">${m.fecha || ''} ${m.grupo ? '· ' + m.grupo : ''}</div>
            `;
            parent.appendChild(article);
          } catch (err){
            console.error('renderMatch wrapper error', err);
          }
        };
      }

      // Si existe renderMatch, envolverlo; si no, crear wrapper para uso futuro
      wrapRenderMatch();

      // Mejora de fetch: wrapper seguro para evitar errores por respuestas inesperadas
      async function safeFetchJson(url, options){
        try {
          const opts = Object.assign({}, options || {});
          // Si enviamos JSON, asegurar header correcto
          if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
            opts.body = JSON.stringify(opts.body);
            opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
          }
          const res = await fetch(url, opts);
          if (!res.ok) throw new Error('Network response not ok: ' + res.status);
          const text = await res.text();
          // Intentar parsear JSON, si falla devolver null y log
          try {
            return JSON.parse(text);
          } catch(e){
            console.warn('safeFetchJson: respuesta no JSON', e);
            return null;
          }
        } catch (err){
          console.error('safeFetchJson error', err);
          return null;
        }
      }

      // Exponer safeFetchJson si no existe
      if (!window.safeFetchJson) window.safeFetchJson = safeFetchJson;

      // Botón de actualizar: intenta llamar a la función fetchMatches si existe,
      // si no, muestra un mensaje y actualiza aria-live.
      document.getElementById('btn-refresh').addEventListener('click', async function(){
        const live = document.getElementById('live-status');
        live.textContent = 'Actualizando...';
        try {
          if (typeof window.fetchMatches === 'function') {
            await window.fetchMatches();
            live.textContent = 'Actualizado';
          } else {
            // Intento de fallback: si hay una URL conocida en window.API_ENDPOINT
            if (window.API_ENDPOINT) {
              const data = await safeFetchJson(window.API_ENDPOINT, { method:'GET' });
              // Si tu código espera data.matches, intenta renderizar con renderMatch
              if (data && Array.isArray(data.matches)) {
                const parent = document.getElementById('matches-section');
                parent.innerHTML = '';
                data.matches.forEach(m => window.renderMatch && window.renderMatch(m, parent));
                live.textContent = 'Actualizado';
              } else {
                live.textContent = 'No hay datos disponibles';
              }
            } else {
              live.textContent = 'Función de actualización no disponible';
            }
          }
        } catch(e){
          console.error(e);
          live.textContent = 'Error al actualizar';
        }
        setTimeout(()=>{ live.textContent = ''; }, 2500);
      });

      // Mejora: detectar recursos 404 y avisar en consola (útil en móvil)
      window.addEventListener('error', function(e){
        try {
          const target = e.target || e.srcElement;
          if (target && (target.tagName === 'IMG' || target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
            console.warn('Recurso fallido:', target.tagName, target.src || target.href);
          }
        } catch(err){}
      }, true);

      // Si tu app usa Service Worker y está causando problemas, este snippet no lo elimina,
      // pero permite desregistrarlo manualmente desde consola si es necesario:
      window.MundialONUtils.unregisterServiceWorkers = async function(){
        if (!('serviceWorker' in navigator)) return;
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) {
          try { await r.unregister(); console.log('SW unregistered'); } catch(e){ console.warn(e); }
        }
      };

      // Mensaje inicial para indicar que el parche está activo
      console.log('MundialON mobile patch loaded. Utilidades disponibles en window.MundialONUtils');
    })();
  </script>

  <!--
    NOTA IMPORTANTE:
    - Si tu index.html original incluye scripts externos o tu propio script principal,
      insértalos justo después de este bloque <script> para que las utilidades estén disponibles.
    - Ejemplo:
      <script src="js/main.js" defer></script>
    - No elimines tus funciones originales; este archivo envuelve y añade validaciones sin sobrescribir la lógica existente.
  -->
</body>
</html>
